<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jiroskopik Labirent Oyunu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #1a1a1a;
            font-family: sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="overlay">
            <h2>Labirent Macerası</h2>
            <p>Telefonunuzu rahat ettiğiniz bir açıda (tepsi gibi) tutun ve ardından butona basın.</p>
            <button class="btn" id="start-btn">OYUNA BAŞLA</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite } = Matter;

        let engine, render, runner;
        let ball;
        // Görselin en-boy oranına sadık kalmak adına baz ölçüleri güncelledik (3:4 oranı)
        const baseWidth = 600;  
        const baseHeight = 800; 

        let biasX = null;
        let biasY = null;
        const maxActiveAngle = 10; 

        function initGame() {
            engine = Engine.create({
                gravity: { x: 0, y: 0, scale: 0.001 } 
            });

            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight) * 0.95;
            const canvasWidth = baseWidth * scale;
            const canvasHeight = baseHeight * scale;

            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: canvasWidth,
                    height: canvasHeight,
                    wireframes: false,
                    background: '#ffffff'
                }
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            createMaze(canvasWidth, canvasHeight, scale);
        }

        function createMaze(width, height, scale) {
            const world = engine.world;
            Composite.clear(world); 

            // Topu tam olarak üstteki giriş boşluğunun hizasında (X: 250) başlatıyoruz
            ball = Bodies.circle(250 * scale, 35 * scale, 10 * scale, {
                restitution: 0.1,      
                friction: 0.1,         
                frictionAir: 0.07,     
                density: 0.001,
                render: { fillStyle: '#7f8c8d' }
            });
            Composite.add(world, ball);

            const wallColor = '#000000';
            const wThickness = 12 * scale; // Çizgi kalınlığı

            // Labirentin ana sınır köşe koordinatları (Orijinal resimdeki iç çerçevenin başladığı yerler)
            const startX = 100 * scale;
            const endX = 520 * scale;
            const startY = 170 * scale;
            const endY = 610 * scale;
            
            // Grid birim mesafeleri
            const stepX = (endX - startX) / 6; // ~70px
            const stepY = (endY - startY) / 6; // ~73px

            // Dikdörtgen duvar bloklarını merkez noktası formülüne göre oluşturan yardımcı fonksiyon
            function createWall(x1, y1, x2, y2) {
                const cx = (x1 + x2) / 2;
                const cy = (y1 + y2) / 2;
                const w = Math.abs(x2 - x1) === 0 ? wThickness : Math.abs(x2 - x1) + wThickness;
                const h = Math.abs(y2 - y1) === 0 ? wThickness : Math.abs(y2 - y1) + wThickness;
                return Bodies.rectangle(cx, cy, w, h, { isStatic: true, render: { fillStyle: wallColor } });
            }

            const mazeWalls = [
                // === DIŞ DUVARLAR VE GİRİŞ/ÇIKIŞ BOŞLUKLARI ===
                createWall(startX, startY, startX + stepX * 2, startY), // Üst Sol Sol
                createWall(startX + stepX * 3, startY, endX, startY),   // Üst Sağ (Giriş boşluğu bırakıldı)
                createWall(startX, endY, startY + stepX * 1.7, endY),   // Alt Sol (Çıkış boşluğu bırakıldı)
                createWall(startX + stepX * 2.7, endY, endX, endY),     // Alt Sağ
                createWall(startX, startY, startX, endY),               // Sol Dış Kenar
                createWall(endX, startY, endX, endY),                   // Sağ Dış Kenar

                // === İÇ DUVARLAR (YATAYLAR) ===
                createWall(startX + stepX, startY + stepY, startX + stepX * 5, startY + stepY), 
                createWall(startX, startY + stepY * 3, startX + stepX * 4, startY + stepY * 3),
                createWall(startX + stepX * 5, startY + stepY * 3, endX, startY + stepY * 3),
                createWall(startX + stepX, startY + stepY * 4, startX + stepX * 2, startY + stepY * 4),
                createWall(startX + stepX * 3, startY + stepY * 4, startX + stepX * 5, startY + stepY * 4),
                createWall(startX + stepX, startY + stepY * 5, endX, startY + stepY * 5),

                // === İÇ DUVARLAR (DİKEYLER) ===
                createWall(startX + stepX * 2, startY, startX + stepX * 2, startY + stepY * 1.3),
                createWall(startX + stepX, startY + stepY, startX + stepX, startY + stepY * 2),
                createWall(startX + stepX * 4, startY + stepY, startX + stepX * 4, startY + stepY * 3),
                createWall(startX + stepX * 5, startY + stepY, startX + stepX * 5, startY + stepY * 2),
                createWall(startX + stepX, startY + stepY * 4, startX + stepX, startY + stepY * 5),
                createWall(startX + stepX * 2, startY + stepY * 4.9, startX + stepX * 2, endY),
                createWall(startX + stepX * 3, startY + stepY * 4, startX + stepX * 3, startY + stepY * 5)
            ];

            Composite.add(world, mazeWalls);
        }

        function handleOrientation(event) {
            let beta = event.beta;
            let gamma = event.gamma;

            if (beta === null || gamma === null) return;

            if (biasX === null || biasY === null) {
                biasX = gamma;
                biasY = beta;
                return;
            }

            let relativeX = gamma - biasX;
            let relativeY = beta - biasY;

            let factorX = relativeX / maxActiveAngle;
            let factorY = relativeY / maxActiveAngle;

            factorX = Math.max(Math.min(factorX, 1), -1);
            factorY = Math.max(Math.min(factorY, 1), -1);

            if (Math.abs(relativeX) < 0.5) factorX = 0;
            if (Math.abs(relativeY) < 0.5) factorY = 0;

            const maxGravity = 0.75; 
            engine.gravity.x = factorX * maxGravity;
            engine.gravity.y = factorY * maxGravity;
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            
            biasX = null;
            biasY = null;

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            initGame();
                        } else {
                            alert('Jiroskop izni verilmedi.');
                            initGame(); 
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        initGame();
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                initGame();
            }
        });
    </script>
</body>
</html>

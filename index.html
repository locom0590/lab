<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jiroskopik Labirent Oyunu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #1a1a1a;
            font-family: sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="overlay">
            <h2>Labirent Macerası</h2>
            <p>Topu hareket ettirmek için telefonu bir tepsi gibi düz tutun ve aşağıdaki butona basın.</p>
            <button class="btn" id="start-btn">OYUNA BAŞLA</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite } = Matter;

        let engine, render, runner;
        let ball;
        const baseWidth = 600;  
        const baseHeight = 800; 

        function initGame() {
            engine = Engine.create({
                gravity: { x: 0, y: 0, scale: 0.001 } 
            });

            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight) * 0.95;
            const canvasWidth = baseWidth * scale;
            const canvasHeight = baseHeight * scale;

            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: canvasWidth,
                    height: canvasHeight,
                    wireframes: false,
                    background: '#ffffff'
                }
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            createMaze(canvasWidth, canvasHeight, scale);
        }

        function createMaze(width, height, scale) {
            const world = engine.world;
            Composite.clear(world); 

            // Topu üst orta kısımdan başlatıyoruz
            ball = Bodies.circle(width / 2, 40 * scale, 12 * scale, {
                restitution: 0.3, 
                friction: 0.05,
                render: { fillStyle: '#7f8c8d' }
            });
            Composite.add(world, ball);

            // Geçici Sınır Duvarları
            const thickness = 20 * scale;
            const walls = [
                Bodies.rectangle(thickness/2, height/2, thickness, height, { isStatic: true, render: { fillStyle: '#000000' } }),
                Bodies.rectangle(width - thickness/2, height/2, thickness, height, { isStatic: true, render: { fillStyle: '#000000' } }),
                Bodies.rectangle(width/2, thickness/2, width, thickness, { isStatic: true, render: { fillStyle: '#000000' } }),
                Bodies.rectangle(width/2, height - thickness/2, width, thickness, { isStatic: true, render: { fillStyle: '#000000' } })
            ];
            Composite.add(world, walls);
        }

        function handleOrientation(event) {
            let beta = event.beta;
            let gamma = event.gamma;

            if (beta === null || gamma === null) return;

            let targetX = gamma;      // Sağ-Sol eğim
            let targetY = beta - 45;  // Ön-Arka eğim (45 dereceyi nötr kabul ediyoruz)

            const sensitivity = 0.03; // Hassasiyet çarpanı
            engine.gravity.x = Math.max(Math.min(targetX * sensitivity, 2), -2);
            engine.gravity.y = Math.max(Math.min(targetY * sensitivity, 2), -2);
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            // Butona basıldığında overlay'i gizle
            document.getElementById('overlay').style.display = 'none';
            
            // Jiroskop izni talep et (iOS için)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            initGame();
                        } else {
                            alert('Jiroskop izni verilmedi.');
                            initGame(); // İzin verilmezse masaüstünde test için yine de başlat
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        initGame();
                    });
            } else {
                // Android veya Masaüstü tarayıcılar
                window.addEventListener('deviceorientation', handleOrientation);
                initGame();
            }
        });
    </script>
</body>
</html>
